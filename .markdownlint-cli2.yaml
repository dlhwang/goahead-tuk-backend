# markdownlint-cli2 configuration
# Run: npx markdownlint-cli2 "**/*.md"

config:
  # Rule content contains long URLs, diagrams, and code examples.
  MD013: false

  # Rule documents may contain inline HTML.
  MD033: false

  # Phase documents intentionally repeat standard headings.
  MD024: false

  # Rule documents use bold sub-labels.
  MD036: false

  # Tables must use aligned column style.
  MD060:
    style: "aligned"

ignores:
  - "node_modules/**"
